<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Africa Ops Notes | Home</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Africa Ops Notes</h1>
    <div class="hero-actions">
      <button id="signOutBtn" type="button">Sign Out</button>
    </div>
  </header>
  <main>
    <!-- Main content here -->
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDiFzsjV1ccCCZKssdGKT4UQusQL-IXy-E",
      authDomain: "africa-ops-notes.firebaseapp.com",
      projectId: "africa-ops-notes",
      storageBucket: "africa-ops-notes.firebasestorage.app",
      messagingSenderId: "503859879624",
      appId: "1:503859879624:web:e3e77ba959b31420998ffd"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const signOutBtn = document.getElementById('signOutBtn');

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = 'index.html';
      }
    });

    signOutBtn.addEventListener('click', async () => {
      try {
        await signOut(auth);
        window.location.href = 'index.html';
      } catch (error) {
        console.error('Sign-out failed:', error);
        alert('Unable to sign out right now. Please try again.');
      }
    });
  </script>
</body>
</html>
