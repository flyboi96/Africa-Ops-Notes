<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seed Africa Country Shells</title>
  <style>
    body { font-family: Inter, sans-serif; background:#0b1220; color:#e5e7eb; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
    .card { background:#111827; padding:28px; border-radius:16px; border:1px solid rgba(255,255,255,0.08); max-width:520px; width:100%; }
    h1 { margin:0 0 12px; font-size:1.4rem; }
    p { margin:0 0 18px; color:#9ca3af; }
    button { padding:12px 16px; border-radius:10px; border:none; font-weight:700; cursor:pointer; background:#3b82f6; color:white; }
    button:disabled { opacity:0.5; cursor:not-allowed; }
    .status { margin-top:16px; font-size:0.95rem; color:#93c5fd; white-space:pre-wrap; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Seed Country Shells</h1>
    <p>This will create a Firestore document for every African country using ISO3 as the document ID.</p>
    <button id="seedBtn">Run One-Time Seed</button>
    <div class="status" id="status">Ready.</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import { getFirestore, writeBatch, doc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDiFzsjV1ccCCZKssdGKT4UQusQL-IXy-E",
      authDomain: "africa-ops-notes.firebaseapp.com",
      projectId: "africa-ops-notes",
      storageBucket: "africa-ops-notes.firebasestorage.app",
      messagingSenderId: "503859879624",
      appId: "1:503859879624:web:e3e77ba959b31420998ffd"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const statusEl = document.getElementById('status');
    const seedBtn = document.getElementById('seedBtn');

    const countryShells = [
      ['AGO','Angola'],['BDI','Burundi'],['BEN','Benin'],['BFA','Burkina Faso'],['BWA','Botswana'],
      ['CAF','Central African Republic'],['CIV',"Cote d'Ivoire"],['CMR','Cameroon'],
      ['COD','Democratic Republic of the Congo'],['COG','Republic of the Congo'],
      ['COM','Comoros'],['CPV','Cape Verde'],['DJI','Djibouti'],['DZA','Algeria'],
      ['EGY','Egypt'],['ERI','Eritrea'],['ESH','Western Sahara'],['ETH','Ethiopia'],
      ['GAB','Gabon'],['GHA','Ghana'],['GIN','Guinea'],['GMB','Gambia'],
      ['GNB','Guinea-Bissau'],['GNQ','Equatorial Guinea'],['KEN','Kenya'],
      ['LBR','Liberia'],['LBY','Libya'],['LSO','Lesotho'],['MAR','Morocco'],
      ['MDG','Madagascar'],['MLI','Mali'],['MOZ','Mozambique'],['MRT','Mauritania'],
      ['MUS','Mauritius'],['MWI','Malawi'],['NAM','Namibia'],['NER','Niger'],
      ['NGA','Nigeria'],['RWA','Rwanda'],['SDN','Sudan'],['SEN','Senegal'],
      ['SLE','Sierra Leone'],['SOM','Somalia'],['SSD','South Sudan'],
      ['STP','Sao Tome and Principe'],['SWZ','Eswatini'],['TCD','Chad'],
      ['TGO','Togo'],['TUN','Tunisia'],['TZA','Tanzania'],['UGA','Uganda'],
      ['ZAF','South Africa'],['ZMB','Zambia'],['ZWE','Zimbabwe']
    ];

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        statusEl.textContent = 'You must be signed in. Open this page from your app session.';
        seedBtn.disabled = true;
      }
    });

    seedBtn.addEventListener('click', async () => {
      seedBtn.disabled = true;
      statusEl.textContent = 'Seeding country shells...';

      try {
        const batch = writeBatch(db);

        countryShells.forEach(([iso3, name]) => {
          const ref = doc(db, 'countries', iso3);
          batch.set(ref, {
            iso3,
            name,
            leadTime: '',
            validity: '',
            portsOfEntry: [],
            aircrewVisa: '',
            passengerVisa: '',
            planningNotes: '',
            generalNotes: ''
          }, { merge: true });
        });

        await batch.commit();
        statusEl.textContent = `Success. Seeded ${countryShells.length} countries.`;
      } catch (err) {
        console.error(err);
        statusEl.textContent = 'Error during seed. Check console.';
        seedBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
